<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu | Sport Rental</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1529900748604-07564a03e7a6?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .auth-card {
            background-color: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            color: #333;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-title {
            color: #721114;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .otp-input {
            letter-spacing: 5px;
            font-size: 1.5rem;
            text-align: center;
            font-weight: bold;
        }

        .form-control {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            color: #333;
            padding: 12px;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #721114;
            box-shadow: 0 0 0 0.25rem rgba(114, 17, 20, 0.25);
            color: #333;
        }

        .btn-auth {
            background-color: #721114;
            color: #fff;
            font-weight: 700;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-auth:hover {
            background-color: #a3161a;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h3 class="auth-title">Tạo mật khẩu mới</h3>
        <p class="mb-4 text-muted">Mã OTP đã được gửi đến email <b><span th:text="${email}"></span></b>. Vui lòng kiểm tra và tạo mật khẩu mới.</p>

        <div th:if="${error}" class="alert alert-danger text-center">
            <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="alert alert-success text-center">
            <span th:text="${success}"></span>
        </div>

        <form th:action="@{/reset-password}" method="post" class="text-start">
            <input type="hidden" name="email" th:value="${email}">

            <div class="mb-3">
                <label class="form-label fw-bold">Mã OTP (6 số)</label>
                <input type="text" name="otpCode" class="form-control otp-input" placeholder="------" maxlength="6" required autofocus autocomplete="off">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Mật khẩu mới</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="newPassword" class="form-control" placeholder="Nhập mật khẩu mới" required>
                    <button class="btn btn-outline-secondary password-toggle" type="button" style="border-color: #ddd;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Nhập lại mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu" required>
                    <button class="btn btn-outline-secondary password-toggle" type="button" style="border-color: #ddd;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-auth">ĐẶT LẠI MẬT KHẨU</button>
        </form>

        <!-- Thêm form gửi lại mã ở đây -->
        <form th:action="@{/forgot-password}" method="post" class="mt-3">
            <input type="hidden" name="email" th:value="${email}">
            <button type="submit" class="btn btn-link p-0 m-0 align-baseline text-muted" style="text-decoration: underline;">Gửi lại mã OTP</button>
        </form>
    </div>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>
