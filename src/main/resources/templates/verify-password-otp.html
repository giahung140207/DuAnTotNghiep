<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận OTP Đổi Mật Khẩu | Sport Rental</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <style>
        body {
            background-color: #f4f4f4; /* Nền xám nhạt */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.1);
            color: #333;
            text-align: center;
        }

        .auth-title {
            color: #721114;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .otp-input {
            letter-spacing: 5px;
            font-size: 1.5rem;
            text-align: center;
            font-weight: bold;
            border: 2px solid #ccc;
            background-color: #f9f9f9;
        }
        .otp-input:focus {
            border-color: #721114;
            box-shadow: none;
        }

        .btn-auth {
            background-color: #721114;
            color: #fff;
            font-weight: 700;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-auth:hover {
            background-color: #a3161a;
        }

        .resend-btn {
            background: none;
            border: none;
            color: #721114;
            font-weight: 600;
            text-decoration: underline;
            padding: 0;
            margin-top: 15px;
        }
        .resend-btn:disabled {
            color: #999;
            text-decoration: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h3 class="auth-title">Xác thực Đổi Mật Khẩu</h3>
        <p class="mb-4 text-muted">Vì lý do bảo mật, chúng tôi đã gửi mã OTP gồm 6 chữ số đến email của bạn. Vui lòng nhập mã để hoàn tất đổi mật khẩu.</p>

        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>

        <form th:action="@{/verify-password-otp}" method="post">
            <div class="mb-3">
                <input type="text" name="otpCode" class="form-control otp-input" placeholder="------" maxlength="6" required autofocus autocomplete="off">
            </div>

            <button type="submit" class="btn btn-auth">XÁC NHẬN ĐỔI MẬT KHẨU</button>
        </form>

        <form th:action="@{/resend-password-otp}" method="post" id="resendForm">
            <button type="submit" class="resend-btn" id="resendBtn">Gửi lại mã (<span id="countdown">60</span>s)</button>
        </form>

        <div class="mt-4">
            <a th:href="@{/profile}" class="text-muted" style="text-decoration: underline; font-size: 0.9rem;">Hủy thao tác và quay lại</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var timeLeft = 60;
            var countdownElem = document.getElementById("countdown");
            var resendBtn = document.getElementById("resendBtn");

            resendBtn.disabled = true;

            var timer = setInterval(function() {
                timeLeft--;
                countdownElem.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    resendBtn.disabled = false;
                    resendBtn.innerHTML = "Gửi lại mã ngay";
                }
            }, 1000);
        });
    </script>
</body>
</html>
