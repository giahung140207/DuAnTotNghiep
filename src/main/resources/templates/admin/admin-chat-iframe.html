<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Thêm thư viện SockJS và STOMP cho WebSocket -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        body { background-color: #0a192f; overflow: hidden; }
        .chat-box {
            height: calc(100vh - 60px);
            overflow-y: scroll;
            padding: 10px;
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        .message-container {
            display: flex;
            width: 100%;
            margin-bottom: 10px;
        }
        .message-container.sent {
            justify-content: flex-end;
        }
        .message-container.received {
            justify-content: flex-start;
        }
        .message {
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 0.9rem;
            word-wrap: break-word;
        }
        .message.sent-bubble {
            background-color: #64ffda;
            color: #0a192f;
            border-bottom-right-radius: 5px;
        }
        .message.received-bubble {
            background-color: #233554;
            color: #ccd6f6;
            border-bottom-left-radius: 5px;
        }
    </style>
</head>
<body class="p-2">

    <input type="hidden" id="targetUserId" th:value="${targetUserId}">

    <div class="chat-box" id="chatBox">
        <div th:replace="~{::messageList}"></div>
    </div>

    <div th:fragment="messageList" style="display: contents;">
        <div th:each="msg : ${messages}"
             th:class="${'message-container ' + (msg.admin != null ? 'sent' : 'received')}">
            <div th:class="${'message ' + (msg.admin != null ? 'sent-bubble' : 'received-bubble')}">
                <div th:text="${msg.content}"></div>
                <small style="font-size: 0.7rem; opacity: 0.7;"
                       th:text="${#temporals.format(msg.timestamp, 'HH:mm')}"></small>
            </div>
        </div>
    </div>

    <form id="chatForm" class="d-flex p-2 fixed-bottom bg-dark" style="border-top: 1px solid #233554;">
        <input type="text" id="content" name="content" class="form-control me-2" placeholder="Nhập tin nhắn..." required autocomplete="off">
        <button type="submit" class="btn btn-sm" style="background: var(--accent-color); color: #0a192f;">Gửi</button>
    </form>

    <script>
        var token = $("meta[name='_csrf']").attr("content");
        var header = $("meta[name='_csrf_header']").attr("content");

        if (token && header) {
            $(document).ajaxSend(function(e, xhr, options) {
                xhr.setRequestHeader(header, token);
            });
        }

        var chatBox = document.getElementById("chatBox");
        var userId = document.getElementById("targetUserId").value;
        var stompClient = null;

        function scrollToBottom() {
            if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- TÍCH HỢP WEBSOCKET ---
        function connectWebSocket() {
            var socket = new SockJS('/chat-websocket');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            stompClient.connect({}, function (frame) {
                console.log('Connected to WebSocket!');
                // Đăng ký lắng nghe kênh chat của khách hàng này
                stompClient.subscribe('/topic/messages/' + userId, function (message) {
                    if (message.body === 'NEW_MESSAGE') {
                        loadMessages(false);
                    }
                });
            }, function(error) {
                console.log("WebSocket error. Reconnecting in 5s...");
                setTimeout(connectWebSocket, 5000);
            });
        }

        $(document).ready(function() {
            scrollToBottom();
            connectWebSocket(); // Khởi động WebSocket
        });

        $('#chatForm').submit(function(e) {
            e.preventDefault();
            var content = $('#content').val();

            if (!content.trim()) return;

            $.post('/admin/chat-reply-ajax', { userId: userId, content: content }, function(response) {
                if (response === 'success') {
                    $('#content').val('');

                    // Gửi tín hiệu WebSocket để khách hàng biết
                    if (stompClient && stompClient.connected) {
                        stompClient.send("/app/chat", {}, JSON.stringify({
                            'userId': userId,
                            'content': 'ping',
                            'senderType': 'ADMIN'
                        }));
                    }

                    loadMessages(true);
                }
            });
        });

        function loadMessages(forceScroll = false) {
            var isAtBottom = (chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight) < 50;

            $.get('/admin/chat-messages-iframe?userId=' + userId, function(data) {
                 $('#chatBox').html(data);
                 if (isAtBottom || forceScroll) {
                     scrollToBottom();
                 }
            });
        }

        // Bỏ Polling cũ
        // setInterval(loadMessages, 3000);
    </script>
</body>
</html>
