<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hỗ trợ Khách hàng | Admin</title>
    <!-- THÊM META CSRF -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Thêm thư viện SockJS và STOMP cho WebSocket -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        /* Custom CSS cho trang Support */
        .chat-container {
            height: calc(100vh - 150px);
            background-color: #fff;
            border: 1px solid #721114; /* Viền đỏ */
            border-radius: 10px;
            overflow: hidden;
            display: flex;
        }

        /* Danh sách User bên trái */
        .user-list {
            width: 300px;
            background-color: #f9f9f9;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .user-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background-color 0.2s;
            color: #333;
            display: flex;
            flex-direction: column;
        }

        .user-item:hover, .user-item.active {
            background-color: rgba(114, 17, 20, 0.1); /* Hover đỏ nhạt */
            border-left: 4px solid #721114;
        }

        .user-item .badge {
            background-color: #721114 !important;
        }

        /* Khung Chat bên phải */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #fff;
            position: relative;
            overflow: hidden; /* KHÓA CHẶT KHÔNG CHO TRÀN RA NGOÀI */
        }

        .chat-header {
            padding: 15px;
            background-color: #721114; /* Header đỏ */
            color: #fff;
            border-bottom: 1px solid #a3161a;
            font-weight: bold;
            flex-shrink: 0; /* KHÔNG CHO HEADER BỊ ÉP NHỎ */
        }

        /* KHUNG CHAT MESSAGES - FIX TRIỆT ĐỂ LỖI TRÀN KHUNG */
        .chat-messages {
            flex: 1 1 auto;
            height: 0; /* ÉP CHIỀU CAO BẰNG 0 ĐỂ FLEXBOX TỰ TÍNH TOÁN LẠI VÀ SINH THANH CUỘN */
            padding: 20px;
            overflow-y: auto;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        /* Nút Scroll Down */
        #scrollDownBtn {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #721114;
            color: white;
            border: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s;
        }

        #scrollDownBtn:hover {
            transform: scale(1.1);
            background-color: #a3161a;
        }

        .message-container {
            display: flex;
            width: 100%;
            margin-bottom: 10px;
            flex-shrink: 0; /* ĐẢM BẢO TIN NHẮN KHÔNG BỊ BÓP MÉO */
        }
        .message-container.sent {
            justify-content: flex-end; /* Admin gửi: Căn phải */
        }
        .message-container.received {
            justify-content: flex-start; /* Khách gửi: Căn trái */
        }
        .message {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
            font-size: 0.95rem;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* Tin nhắn của Admin (Phải) */
        .message.sent-bubble {
            background-color: #721114;
            color: #fff;
            border-bottom-right-radius: 2px;
        }

        /* Tin nhắn của Khách (Trái) */
        .message.received-bubble {
            background-color: #fff;
            color: #333;
            border: 1px solid #ddd;
            border-bottom-left-radius: 2px;
        }

        .chat-input {
            padding: 15px;
            background-color: #fff;
            border-top: 1px solid #e0e0e0;
            flex-shrink: 0; /* KHÔNG CHO KHUNG NHẬP CHỮ BỊ ĐẨY ĐI MẤT */
        }

        .chat-input input {
            border-color: #ccc;
        }

        .chat-input button {
            background-color: #721114;
            color: #fff;
            border: none;
        }
        .chat-input button:hover {
            background-color: #a3161a;
        }
    </style>
</head>
<body>

    <!-- Sidebar Fragment -->
    <div th:replace="~{fragments/admin-sidebar :: sidebar('support')}"></div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom" style="border-color: #721114 !important;">
            <h2 class="m-0">Hỗ trợ Khách hàng</h2>
        </div>

        <div class="chat-container shadow-sm">
            <!-- Danh sách User -->
            <div class="user-list">
                <div th:each="user : ${users}"
                     class="user-item"
                     th:classappend="${selectedUser != null and selectedUser.id == user.id ? 'active' : ''}"
                     th:onclick="'window.location.href=\'/admin/support?userId=' + ${user.id} + '\''">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold" th:text="${user.fullName}">User Name</span>
                    </div>
                    <small class="text-muted" th:text="${user.email}">email@example.com</small>
                </div>
                <div th:if="${users.isEmpty()}" class="p-3 text-center text-muted">
                    Chưa có khách hàng nào nhắn tin.
                </div>
            </div>

            <!-- Khu vực Chat -->
            <div class="chat-area">
                <div class="chat-header" th:if="${selectedUser != null}">
                    <i class="fas fa-user-circle me-2"></i>
                    <span th:text="${selectedUser.fullName}">User Name</span>
                    <!-- Nút kết thúc hỗ trợ -->
                    <a th:href="@{/admin/support/end/{id}(id=${selectedUser.id})}" class="btn btn-sm btn-outline-light float-end" onclick="return confirm('Kết thúc phiên hỗ trợ này?')">Kết thúc</a>
                </div>
                <div class="chat-header bg-light text-dark border-bottom" th:unless="${selectedUser != null}">
                    Vui lòng chọn khách hàng để chat
                </div>

                <!-- Nút Scroll Down -->
                <button id="scrollDownBtn" onclick="forceScrollToBottom()" th:if="${selectedUser != null}">
                    <i class="fas fa-chevron-down"></i>
                </button>

                <!-- KHUNG CHỨA TIN NHẮN (ĐÃ FIX CSS) -->
                <div class="chat-messages" id="chatBox">
                    <!-- BỌC BẰNG DIV MỚI ĐỂ TRÁNH LỖI FLEX -->
                    <div id="messagesWrapper" style="display: flex; flex-direction: column; width: 100%;">
                        <th:block th:if="${selectedUser != null}">
                            <div th:each="msg : ${messages}"
                                 th:class="${'message-container ' + (msg.admin != null ? 'sent' : 'received')}">
                                <div th:class="${'message ' + (msg.admin != null ? 'sent-bubble' : 'received-bubble')}">
                                    <div th:text="${msg.content}">Nội dung tin nhắn</div>
                                    <small style="font-size: 0.7rem; opacity: 0.7; display: block; margin-top: 5px;"
                                           th:styleappend="${msg.admin != null ? 'text-align: right;' : 'text-align: left;'}"
                                           th:text="${#temporals.format(msg.timestamp, 'HH:mm dd/MM')}">10:00</small>
                                </div>
                            </div>
                        </th:block>
                    </div>
                </div>

                <div class="chat-input" th:if="${selectedUser != null}">
                    <form id="adminChatForm" th:action="@{/admin/chat-reply-ajax}" class="d-flex gap-2">
                        <input type="hidden" id="receiverId" th:value="${selectedUser.id}">
                        <input type="text" id="messageContent" class="form-control" placeholder="Nhập tin nhắn..." required autocomplete="off">
                        <button type="submit" class="btn btn-primary px-4"><i class="fas fa-paper-plane"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- KHÔNG CẦN TH:FRAGMENT Ở ĐÂY NỮA, SẼ XỬ LÝ TRONG JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

    <script th:if="${selectedUser != null}">
        // CẤU HÌNH CSRF CHO AJAX
        var token = $("meta[name='_csrf']").attr("content");
        var header = $("meta[name='_csrf_header']").attr("content");

        $(document).ajaxSend(function(e, xhr, options) {
            if (token && header) {
                xhr.setRequestHeader(header, token);
            }
        });

        var chatBox = document.getElementById("chatBox");
        var scrollDownBtn = document.getElementById('scrollDownBtn');
        var isUserScrolling = false;
        var userId = $('#receiverId').val();
        var stompClient = null;

        function forceScrollToBottom() {
            if(chatBox) {
                // Cuộn tức thì, không dùng smooth để tránh lỗi DOM giật
                chatBox.scrollTop = chatBox.scrollHeight;
                isUserScrolling = false;
                scrollDownBtn.style.display = 'none';
            }
        }

        if(chatBox) {
            chatBox.addEventListener('scroll', function() {
                var distanceToBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight;
                if (distanceToBottom > 50) {
                    scrollDownBtn.style.display = 'flex';
                    isUserScrolling = true;
                } else {
                    scrollDownBtn.style.display = 'none';
                    isUserScrolling = false;
                }
            });
        }

        // --- TÍCH HỢP WEBSOCKET ---
        function connectWebSocket() {
            var socket = new SockJS('/chat-websocket');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            stompClient.connect({}, function (frame) {
                console.log('Connected to WebSocket (Admin)!');
                // Admin đăng ký lắng nghe kênh chat của khách hàng ĐANG CHỌN
                stompClient.subscribe('/topic/messages/' + userId, function (message) {
                    if (message.body === 'NEW_MESSAGE') {
                        // Khi nhận được tín hiệu có tin nhắn mới -> Lập tức tải lại tin nhắn
                        loadMessages(false);
                    }
                });
            }, function(error) {
                console.log("WebSocket error. Reconnecting in 5s...");
                setTimeout(connectWebSocket, 5000);
            });
        }

        // Vừa vào là cuộn xuống đáy và kết nối socket
        $(document).ready(function() {
            if(chatBox) {
                chatBox.scrollTop = chatBox.scrollHeight;
            }
            if(userId) {
                connectWebSocket();
            }
        });

        $('#adminChatForm').submit(function(e) {
            e.preventDefault();
            var content = $('#messageContent').val();
            var url = $(this).attr('action');

            if (!content.trim()) return;

            $.post(url, {
                userId: userId,
                content: content
            }, function(response) {
                if (response === 'success') {
                    $('#messageContent').val('');

                    // Gửi tín hiệu WebSocket cho Khách hàng biết
                    if (stompClient && stompClient.connected) {
                        stompClient.send("/app/chat", {}, JSON.stringify({
                            'userId': userId,
                            'content': 'ping',
                            'senderType': 'ADMIN'
                        }));
                    }

                    // Ép cuộn xuống khi tự gửi tin nhắn
                    isUserScrolling = false;
                    loadMessages(true);
                }
            });
        });

        function loadMessages(forceScroll = false) {
            if (!userId) return;

            var isAtBottom = (chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight) < 50;

            // Gọi API LẤY TOÀN BỘ TRANG RỒI TRÍCH XUẤT RA PHẦN CHAT BẰNG JQUERY
            $.get('/admin/support?userId=' + userId, function(data) {
                 // Tìm thẻ #messagesWrapper trong kết quả trả về và thay thế nó vào hiện tại
                 var newMessages = $(data).find('#messagesWrapper').html();
                 $('#messagesWrapper').html(newMessages);

                 if (forceScroll || isAtBottom || !isUserScrolling) {
                     chatBox.scrollTop = chatBox.scrollHeight;
                 }
            });
        }

        // Xóa dòng Polling (tự động load mỗi 3 giây)
        // setInterval(loadMessages, 3000);
    </script>
</body>
</html>
