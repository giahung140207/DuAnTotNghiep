<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận OTP | Sport Rental</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1529900748604-07564a03e7a6?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .auth-card {
            background-color: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            color: #333;
            animation: fadeIn 0.5s ease-out;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-title {
            color: #721114;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .otp-input {
            letter-spacing: 5px;
            font-size: 1.5rem;
            text-align: center;
            font-weight: bold;
        }

        .btn-auth {
            background-color: #721114;
            color: #fff;
            font-weight: 700;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-auth:hover {
            background-color: #a3161a;
            transform: translateY(-2px);
        }

        .resend-btn {
            background: none;
            border: none;
            color: #721114;
            font-weight: 600;
            text-decoration: underline;
            padding: 0;
            margin-top: 15px;
        }
        .resend-btn:disabled {
            color: #999;
            text-decoration: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 class="auth-title">Xác thực Email</h2>
        <p class="mb-4">Chúng tôi đã gửi một mã OTP gồm 6 chữ số đến email của bạn. Vui lòng kiểm tra và nhập mã vào bên dưới để kích hoạt tài khoản.</p>

        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>

        <form th:action="@{/verify-otp}" method="post">
            <input type="hidden" name="username" th:value="${username}">

            <div class="mb-3">
                <input type="text" name="otpCode" class="form-control otp-input" placeholder="------" maxlength="6" required autofocus autocomplete="off">
            </div>

            <button type="submit" class="btn btn-auth">XÁC NHẬN MÃ</button>
        </form>

        <form th:action="@{/resend-otp}" method="post" id="resendForm">
            <input type="hidden" name="username" th:value="${username}">
            <button type="submit" class="resend-btn" id="resendBtn">Gửi lại mã (<span id="countdown">60</span>s)</button>
        </form>
    </div>

    <script>
        // Logic đếm ngược 60s cho nút gửi lại mã
        document.addEventListener("DOMContentLoaded", function() {
            var timeLeft = 60;
            var countdownElem = document.getElementById("countdown");
            var resendBtn = document.getElementById("resendBtn");

            resendBtn.disabled = true;

            var timer = setInterval(function() {
                timeLeft--;
                countdownElem.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    resendBtn.disabled = false;
                    resendBtn.innerHTML = "Gửi lại mã ngay";
                }
            }, 1000);
        });
    </script>
</body>
</html>
