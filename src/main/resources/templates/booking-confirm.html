<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Xác nhận đặt sân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg">
        <div class="card-body">

            <h3 class="mb-4 text-center">Xác nhận đặt sân</h3>

            <p><b>Sân:</b> <span th:text="${pitch.name}"></span></p>
            <p><b>Ngày:</b> <span th:text="${date}"></span></p>
            <p><b>Bắt đầu:</b> <span th:text="${startTime}"></span></p>
            <p><b>Kết thúc:</b> <span th:text="${endTime}"></span></p>
            <p><b>Thời lượng:</b> <span th:text="${duration}"></span> phút</p>

            <form th:action="@{/booking/create}" method="post">

                <input type="hidden" name="pitchId" th:value="${pitch.id}">
                <input type="hidden" name="date" th:value="${date}">
                <input type="hidden" name="startTime" th:value="${startTime}">
                <input type="hidden" name="duration" th:value="${duration}">

                <button class="btn btn-success w-100">
                    Xác nhận đặt sân
                </button>

            </form>

            <a th:href="@{'/pitches/' + ${pitch.id}}" class="btn btn-secondary w-100 mt-2">
                Quay lại chỉnh sửa
            </a>

        </div>
    </div>

</div>

</body>
</html>
